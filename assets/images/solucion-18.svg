<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#002266"/>
            <stop offset="100%" stop-color="#1f1402"/>
        </linearGradient>
        <linearGradient id="mountGrad" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#eab308" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#002266" stop-opacity="0.2"/>
        </linearGradient>
        <linearGradient id="fireGrad" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#ef4444"/>
            <stop offset="100%" stop-color="#ea580c"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffffff"/>
        </marker>
    </defs>
    
    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>
    
    <!-- Background Grid -->
    <g opacity="0.15"><line x1="0" y1="45" x2="800" y2="45" stroke="#ffffff" stroke-width="1"/><line x1="80" y1="0" x2="80" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="90" x2="800" y2="90" stroke="#ffffff" stroke-width="1"/><line x1="160" y1="0" x2="160" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="135" x2="800" y2="135" stroke="#ffffff" stroke-width="1"/><line x1="240" y1="0" x2="240" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="180" x2="800" y2="180" stroke="#ffffff" stroke-width="1"/><line x1="320" y1="0" x2="320" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="225" x2="800" y2="225" stroke="#ffffff" stroke-width="1"/><line x1="400" y1="0" x2="400" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="270" x2="800" y2="270" stroke="#ffffff" stroke-width="1"/><line x1="480" y1="0" x2="480" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="315" x2="800" y2="315" stroke="#ffffff" stroke-width="1"/><line x1="560" y1="0" x2="560" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="360" x2="800" y2="360" stroke="#ffffff" stroke-width="1"/><line x1="640" y1="0" x2="640" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="405" x2="800" y2="405" stroke="#ffffff" stroke-width="1"/><line x1="720" y1="0" x2="720" y2="450" stroke="#ffffff" stroke-width="1"/><circle cx="400" cy="225" r="160" fill="none" stroke="#ffcc00" stroke-dasharray="5,5" stroke-width="1.5"/><circle cx="400" cy="225" r="230" fill="none" stroke="#eab308" stroke-dasharray="10,5" stroke-width="1"/></g>
    
    <!-- Unique Graphic Content -->
    
        <path d="M 350 220 Q 400 130 450 220 Q 400 310 350 220 Z" fill="#b45309" stroke="#78350f" stroke-width="3"/>
        <path d="M 370 220 Q 400 150 430 220 Q 400 290 370 220 Z" fill="none" stroke="#d97706" stroke-width="1.5"/>
        <circle cx="430" cy="230" r="28" fill="#0f172a" stroke="#10b981" stroke-width="3"/>
        <path d="M 418 230 L 426 238 L 442 222" stroke="#10b981" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="490" cy="150" r="18" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3,3"/>
        
    
    <!-- Label Badges & Text Overlay -->
    <!-- Grupo badge -->
    <rect x="40" y="40" width="230" height="30" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1" style="backdrop-filter: blur(5px);"/>
    <text x="55" y="59" fill="#ffffff" font-family="'Noto Sans', sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">Grupo 4: Agricultura y EUDR</text>
    
    <!-- ID Display -->
    <text x="760" y="80" fill="rgba(255,255,255,0.08)" font-family="'Noto Sans', sans-serif" font-size="72" font-weight="bold" text-anchor="end">18</text>
    
    <!-- Title -->
    <text x="40" y="360" fill="#ffffff" font-family="'Noto Sans', sans-serif" font-size="20" font-weight="bold">
        <tspan x="40" dy="0">Verificación de Parcelas de Cacao Libre de Deforestació...</tspan>
    </text>
    
    <!-- Institution / Country -->
    <text x="40" y="400" fill="#eab308" font-family="'Noto Sans', sans-serif" font-size="13" font-weight="bold">FUNDALACHUA/ECOLASA | <tspan fill="#ffffff" font-weight="normal">Guatemala</tspan></text>
</svg>
