<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#002266"/>
            <stop offset="100%" stop-color="#2d0b0b"/>
        </linearGradient>
        <linearGradient id="mountGrad" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#ef4444" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#002266" stop-opacity="0.2"/>
        </linearGradient>
        <linearGradient id="fireGrad" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#ef4444"/>
            <stop offset="100%" stop-color="#ea580c"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffffff"/>
        </marker>
    </defs>
    
    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>
    
    <!-- Background Grid -->
    <g opacity="0.15"><line x1="0" y1="45" x2="800" y2="45" stroke="#ffffff" stroke-width="1"/><line x1="80" y1="0" x2="80" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="90" x2="800" y2="90" stroke="#ffffff" stroke-width="1"/><line x1="160" y1="0" x2="160" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="135" x2="800" y2="135" stroke="#ffffff" stroke-width="1"/><line x1="240" y1="0" x2="240" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="180" x2="800" y2="180" stroke="#ffffff" stroke-width="1"/><line x1="320" y1="0" x2="320" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="225" x2="800" y2="225" stroke="#ffffff" stroke-width="1"/><line x1="400" y1="0" x2="400" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="270" x2="800" y2="270" stroke="#ffffff" stroke-width="1"/><line x1="480" y1="0" x2="480" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="315" x2="800" y2="315" stroke="#ffffff" stroke-width="1"/><line x1="560" y1="0" x2="560" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="360" x2="800" y2="360" stroke="#ffffff" stroke-width="1"/><line x1="640" y1="0" x2="640" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="405" x2="800" y2="405" stroke="#ffffff" stroke-width="1"/><line x1="720" y1="0" x2="720" y2="450" stroke="#ffffff" stroke-width="1"/><circle cx="400" cy="225" r="160" fill="none" stroke="#ffcc00" stroke-dasharray="5,5" stroke-width="1.5"/><circle cx="400" cy="225" r="230" fill="none" stroke="#ef4444" stroke-dasharray="10,5" stroke-width="1"/></g>
    
    <!-- Unique Graphic Content -->
    
        <!-- High elevation peaks representing Valle Nuevo -->
        <polygon points="250,290 380,120 510,290" fill="#1c1917" opacity="0.9"/>
        <!-- Left Peak green, Right Peak red/burnt -->
        <path d="M 250 290 L 380 120 L 380 290 Z" fill="#14532d" opacity="0.6"/>
        <path d="M 380 120 L 510 290 L 380 290 Z" fill="#781d1d" opacity="0.6"/>
        <!-- Fire watch tower on peak -->
        <line x1="380" y1="120" x2="380" y2="80" stroke="#cbd5e1" stroke-width="3"/>
        <rect x="370" y="70" width="20" height="15" fill="#f59e0b"/>
        <!-- Green sprout growing from ashes -->
        <path d="M 440 270 Q 450 240 470 240 Q 455 255 445 270 Z" fill="#22c55e"/>
        
    
    <!-- Label Badges & Text Overlay -->
    <!-- Grupo badge -->
    <rect x="40" y="40" width="230" height="30" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1" style="backdrop-filter: blur(5px);"/>
    <text x="55" y="59" fill="#ffffff" font-family="'Noto Sans', sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">Grupo 2: Incendios y Alertas</text>
    
    <!-- ID Display -->
    <text x="760" y="80" fill="rgba(255,255,255,0.08)" font-family="'Noto Sans', sans-serif" font-size="72" font-weight="bold" text-anchor="end">11</text>
    
    <!-- Title -->
    <text x="40" y="360" fill="#ffffff" font-family="'Noto Sans', sans-serif" font-size="20" font-weight="bold">
        <tspan x="40" dy="0">Clúster Copernicus Centroamérica AFOLU II Monitoreo de ...</tspan>
    </text>
    
    <!-- Institution / Country -->
    <text x="40" y="400" fill="#ef4444" font-family="'Noto Sans', sans-serif" font-size="13" font-weight="bold">Ministerio de Medio Ambiente y Recursos Natur... | <tspan fill="#ffffff" font-weight="normal">República Dominicana</tspan></text>
</svg>
