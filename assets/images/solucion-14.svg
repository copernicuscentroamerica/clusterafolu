<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#002266"/>
            <stop offset="100%" stop-color="#022c22"/>
        </linearGradient>
        <linearGradient id="mountGrad" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#10b981" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#002266" stop-opacity="0.2"/>
        </linearGradient>
        <linearGradient id="fireGrad" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#ef4444"/>
            <stop offset="100%" stop-color="#ea580c"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#ffffff"/>
        </marker>
    </defs>
    
    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>
    
    <!-- Background Grid -->
    <g opacity="0.15"><line x1="0" y1="45" x2="800" y2="45" stroke="#ffffff" stroke-width="1"/><line x1="80" y1="0" x2="80" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="90" x2="800" y2="90" stroke="#ffffff" stroke-width="1"/><line x1="160" y1="0" x2="160" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="135" x2="800" y2="135" stroke="#ffffff" stroke-width="1"/><line x1="240" y1="0" x2="240" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="180" x2="800" y2="180" stroke="#ffffff" stroke-width="1"/><line x1="320" y1="0" x2="320" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="225" x2="800" y2="225" stroke="#ffffff" stroke-width="1"/><line x1="400" y1="0" x2="400" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="270" x2="800" y2="270" stroke="#ffffff" stroke-width="1"/><line x1="480" y1="0" x2="480" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="315" x2="800" y2="315" stroke="#ffffff" stroke-width="1"/><line x1="560" y1="0" x2="560" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="360" x2="800" y2="360" stroke="#ffffff" stroke-width="1"/><line x1="640" y1="0" x2="640" y2="450" stroke="#ffffff" stroke-width="1"/><line x1="0" y1="405" x2="800" y2="405" stroke="#ffffff" stroke-width="1"/><line x1="720" y1="0" x2="720" y2="450" stroke="#ffffff" stroke-width="1"/><circle cx="400" cy="225" r="160" fill="none" stroke="#ffcc00" stroke-dasharray="5,5" stroke-width="1.5"/><circle cx="400" cy="225" r="230" fill="none" stroke="#10b981" stroke-dasharray="10,5" stroke-width="1"/></g>
    
    <!-- Unique Graphic Content -->
    
        <!-- Cow profile silhouette -->
        <path d="M 340 250 C 330 240 320 220 320 200 L 330 180 L 350 180 L 360 190 L 390 195 L 430 190 L 460 205 L 470 240 L 460 260 L 440 260 L 435 230 L 395 230 L 390 260 L 370 260 Z" fill="#e2e8f0" opacity="0.85"/>
        <!-- Silvopastoril: trees dispersed around cow -->
        <g fill="#166534">
            <circle cx="300" cy="160" r="25"/>
            <rect x="296" y="180" width="8" height="40" fill="#78350f"/>
            
            <circle cx="480" cy="150" r="30"/>
            <rect x="476" y="170" width="8" height="50" fill="#78350f"/>
        </g>
        <rect x="250" y="250" width="300" height="30" fill="#22c55e" opacity="0.4" rx="5"/>
        
    
    <!-- Label Badges & Text Overlay -->
    <!-- Grupo badge -->
    <rect x="40" y="40" width="230" height="30" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1" style="backdrop-filter: blur(5px);"/>
    <text x="55" y="59" fill="#ffffff" font-family="'Noto Sans', sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">Grupo 3: Conectividad y Biodiversidad</text>
    
    <!-- ID Display -->
    <text x="760" y="80" fill="rgba(255,255,255,0.08)" font-family="'Noto Sans', sans-serif" font-size="72" font-weight="bold" text-anchor="end">14</text>
    
    <!-- Title -->
    <text x="40" y="360" fill="#ffffff" font-family="'Noto Sans', sans-serif" font-size="20" font-weight="bold">
        <tspan x="40" dy="0">Conectividad del Paisaje y Ganadería Sostenible en la B...</tspan>
    </text>
    
    <!-- Institution / Country -->
    <text x="40" y="400" fill="#10b981" font-family="'Noto Sans', sans-serif" font-size="13" font-weight="bold">Universidad Zamorano | <tspan fill="#ffffff" font-weight="normal">Guatemala</tspan></text>
</svg>
